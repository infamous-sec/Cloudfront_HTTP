version: "3.9"

services:
  observer-node:
    image: nginx:alpine
    container_name: observer-node
    ports:
      - "8888:80"
    volumes:
      - ./html:/usr/share/nginx/html:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  observer-logger:
    build: ./logger
    container_name: observer-logger
    volumes:
      - ./logs:/app/logs
    ports:
      - "8890:5000"
    restart: unless-stopped
    environment:
      LOG_LEVEL: INFO
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"