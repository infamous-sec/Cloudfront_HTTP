name: Deploy to cPanel Hosting (SFTP + Notifications)

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    env:
      BUILD_DIR: dist  # Adjust if needed (e.g., build, .next)

    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4

    - name: ⚙️ Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'

    - name: 📦 Install Dependencies
      run: npm ci

    - name: 🔨 Build Project
      run: npm run build

    - name: 🕵️ Obfuscate JavaScript
      run: |
        npm install -g javascript-obfuscator
        javascript-obfuscator $BUILD_DIR --output $BUILD_DIR --compact true --self-defending true

    - name: 🚀 Deploy via SFTP
      uses: wangyucode/sftp-deploy@v1.2.4
      with:
        host: ${{ secrets.SFTP_HOST }}
        port: ${{ secrets.SFTP_PORT }}
        username: ${{ secrets.SFTP_USER }}
        password: ${{ secrets.SFTP_PASS }}
        localPath: ${{ env.BUILD_DIR }}
        remotePath: ${{ secrets.SFTP_PATH }}
        dryRun: false
        deleteRemoteFiles: false

    - name: ✅ Send Discord Notification
      if: success()
      uses: Ilshidur/action-discord@v1
      with:
        webhook: ${{ secrets.DISCORD_WEBHOOK }}
        message: "✅ Cloudfront_HTTP deployed successfully to cPanel via SFTP."

    - name: ❌ Send Discord Failure Alert
      if: failure()
      uses: Ilshidur/action-discord@v1
      with:
        webhook: ${{ secrets.DISCORD_WEBHOOK }}
        message: "🚨 Cloudfront_HTTP deployment failed."

    - name: ✅ Send Slack Notification
      if: success()
      uses: rtCamp/action-slack-notify@v2
      env:
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        SLACK_USERNAME: "CloudfrontBot"
        SLACK_ICON_EMOJI: ":rocket:"
        SLACK_MESSAGE: "✅ Cloudfront_HTTP deployed successfully to cPanel."

    - name: ❌ Send Slack Failure Alert
      if: failure()
      uses: rtCamp/action-slack-notify@v2
      env:
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        SLACK_USERNAME: "CloudfrontBot"
        SLACK_ICON_EMOJI: ":x:"
        SLACK_MESSAGE: "🚨 Cloudfront_HTTP deployment failed."